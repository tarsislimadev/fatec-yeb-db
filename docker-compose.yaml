services:
  www:
    build: './src/www'
    ports:
      - "8000:80"
    depends_on:
      - api

  api:
    build: './src/api'
    ports:
      - "8080:8080"
    depends_on:
      - db

  db:
    build: './src/database'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - db_data:/var/lib/postgresql/data
