name: Azure CI/CD

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    env:
      ACR_NAME: ${{ secrets.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker CLI to push to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/phone-list-api:${{ env.IMAGE_TAG }} ./backend
          docker push ${{ env.ACR_LOGIN_SERVER }}/phone-list-api:${{ env.IMAGE_TAG }}

      - name: Build and push frontend image
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/phone-list-web:${{ env.IMAGE_TAG }} ./frontend
          docker push ${{ env.ACR_LOGIN_SERVER }}/phone-list-web:${{ env.IMAGE_TAG }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Terraform Init & Apply (prod)
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_acr_name: ${{ secrets.ACR_NAME }}
          TF_VAR_image_tag: ${{ env.IMAGE_TAG }}
          TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          TF_VAR_postgres_db_password: ${{ secrets.POSTGRES_DB_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
        run: |
          cd terraform/envs/prod
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=prod.terraform.tfstate"
          terraform apply -auto-approve
          terraform output -raw backend_fqdn > ${{ runner.temp }}/backend_fqdn.txt
          terraform output -raw frontend_fqdn > ${{ runner.temp }}/frontend_fqdn.txt

      - name: Run DB migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          docker run --rm \
            -e DATABASE_URL="${DATABASE_URL}" \
            ${{ env.ACR_LOGIN_SERVER }}/phone-list-api:${{ env.IMAGE_TAG }} npm run migrate

      - name: Verify backend health
        run: |
          BACKEND_URL="https://$(cat ${{ runner.temp }}/backend_fqdn.txt)"
          for i in {1..30}; do
            if curl -s "$BACKEND_URL/health" > /dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 10
          done
          echo "Backend did not become healthy"
          exit 1

      - name: Deployment Summary
        run: |
          echo "=== Deployment Complete ==="
          echo "Backend: https://$(cat ${{ runner.temp }}/backend_fqdn.txt)"
          echo "Frontend: https://$(cat ${{ runner.temp }}/frontend_fqdn.txt)"
