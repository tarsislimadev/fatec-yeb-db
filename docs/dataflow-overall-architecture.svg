<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Define styles -->
  <defs>
    <style>
      .box { fill: #E3F2FD; stroke: #1976D2; stroke-width: 2; }
      .database { fill: #F3E5F5; stroke: #7B1FA2; stroke-width: 2; }
      .service { fill: #E8F5E9; stroke: #388E3C; stroke-width: 2; }
      .client { fill: #FFF3E0; stroke: #F57C00; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="30" class="title">Overall System Architecture - Data Flow</text>

  <!-- Frontend Client -->
  <rect x="50" y="100" width="150" height="80" class="client" rx="5"/>
  <text x="125" y="125" class="text">React Frontend</text>
  <text x="125" y="145" class="text">(Vite)</text>
  <text x="125" y="165" class="text">Port: 5173</text>

  <!-- API Gateway/Server -->
  <rect x="400" y="100" width="150" height="80" class="box" rx="5"/>
  <text x="475" y="125" class="text">Express.js API</text>
  <text x="475" y="145" class="text">Server</text>
  <text x="475" y="165" class="text">Port: 3000</text>

  <!-- Middleware -->
  <rect x="380" y="230" width="190" height="100" class="service" rx="5"/>
  <text x="475" y="255" class="text">Middleware</text>
  <text x="475" y="275" class="text">• Auth Middleware</text>
  <text x="475" y="295" class="text">• CORS</text>
  <text x="475" y="315" class="text">• Error Handling</text>

  <!-- Database -->
  <rect x="700" y="100" width="150" height="80" class="database" rx="5"/>
  <text x="775" y="125" class="text">PostgreSQL</text>
  <text x="775" y="145" class="text">Database</text>
  <text x="775" y="165" class="text">Port: 5432</text>

  <!-- Redis Cache -->
  <rect x="950" y="100" width="150" height="80" class="service" rx="5"/>
  <text x="1025" y="125" class="text">Redis Cache</text>
  <text x="1025" y="145" class="text">(Optional)</text>
  <text x="1025" y="165" class="text">Port: 6379</text>

  <!-- Auth Routes -->
  <rect x="100" y="400" width="140" height="100" class="box" rx="5"/>
  <text x="170" y="420" class="text">Auth Routes</text>
  <text x="170" y="440" class="text">• /signup</text>
  <text x="170" y="460" class="text">• /signin</text>
  <text x="170" y="480" class="text">• /password/*</text>

  <!-- Phone Routes -->
  <rect x="320" y="400" width="140" height="100" class="box" rx="5"/>
  <text x="390" y="420" class="text">Phone Routes</text>
  <text x="390" y="440" class="text">• GET /phones</text>
  <text x="390" y="460" class="text">• POST /phones</text>
  <text x="390" y="480" class="text">• DELETE /phones</text>

  <!-- Controllers -->
  <rect x="540" y="400" width="140" height="100" class="box" rx="5"/>
  <text x="610" y="420" class="text">Controllers</text>
  <text x="610" y="440" class="text">• authController</text>
  <text x="610" y="460" class="text">• phoneController</text>
  <text x="610" y="480" class="text">• ownerController</text>

  <!-- Data Tables -->
  <rect x="850" y="380" width="120" height="140" class="database" rx="5"/>
  <text x="910" y="405" class="text">Tables</text>
  <text x="910" y="425" class="text">• users</text>
  <text x="910" y="445" class="text">• phones</text>
  <text x="910" y="465" class="text">• people</text>
  <text x="910" y="485" class="text">• businesses</text>
  <text x="910" y="505" class="text">• relations</text>

  <!-- Arrows - Frontend to API -->
  <path d="M 200 140 L 400 140" class="arrow"/>
  <text x="295" y="130" class="label">HTTP/REST</text>

  <!-- API to Middleware -->
  <path d="M 475 180 L 475 230" class="arrow"/>
  <text x="545" y="205" class="label">Process</text>

  <!-- Middleware to Routes -->
  <path d="M 440 330 L 280 400" class="arrow"/>
  <path d="M 475 330 L 390 400" class="arrow"/>
  <text x="350" y="365" class="label">Route</text>

  <!-- Routes to Controllers -->
  <path d="M 460 400 L 540 450" class="arrow"/>
  <path d="M 540 450" class="arrow"/>
  <text x="500" y="390" class="label">Dispatch</text>

  <!-- Controllers to Database -->
  <path d="M 680 450 L 850 450" class="arrow"/>
  <text x="760" y="440" class="label">SQL Query</text>

  <!-- Database to API -->
  <path d="M 775 180 L 550 180" class="arrow"/>
  <text x="660" y="170" class="label">Result Set</text>

  <!-- API to Frontend -->
  <path d="M 400 140 L 200 140" class="arrow"/>
  <text x="295" y="155" class="label">JSON Response</text>

  <!-- API to Redis -->
  <path d="M 550 140 L 950 140" class="arrow" stroke-dasharray="5,5"/>
  <text x="750" y="130" class="label">Cache (Optional)</text>

  <!-- Legend -->
  <rect x="50" y="650" width="1100" height="120" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="670" class="text" style="text-anchor: start; font-weight: bold;">Legend:</text>
  
  <rect x="80" y="685" width="20" height="20" class="client"/>
  <text x="120" y="700" class="label" style="text-anchor: start;">Client/Frontend</text>
  
  <rect x="320" y="685" width="20" height="20" class="box"/>
  <text x="360" y="700" class="label" style="text-anchor: start;">API/Routes</text>
  
  <rect x="560" y="685" width="20" height="20" class="service"/>
  <text x="600" y="700" class="label" style="text-anchor: start;">Services/Middleware</text>
  
  <rect x="850" y="685" width="20" height="20" class="database"/>
  <text x="890" y="700" class="label" style="text-anchor: start;">Database</text>

  <line x1="80" y1="735" x2="130" y2="735" class="arrow"/>
  <text x="150" y="740" class="label" style="text-anchor: start;">Data Flow</text>

  <line x1="380" y1="735" x2="430" y2="735" class="arrow" stroke-dasharray="5,5"/>
  <text x="450" y="740" class="label" style="text-anchor: start;">Optional Flow</text>
</svg>