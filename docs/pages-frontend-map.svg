<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900">
  <!-- Define styles -->
  <defs>
    <style>
      .page { fill: #E8F5E9; stroke: #388E3C; stroke-width: 2; }
      .page-public { fill: #FFF3E0; stroke: #F57C00; stroke-width: 2; }
      .page-protected { fill: #E3F2FD; stroke: #1976D2; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 13px; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .subtitle { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; text-anchor: middle; }
      .label { font-family: Arial, sans-serif; font-size: 11px; text-anchor: middle; fill: #333; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-auth { stroke: #F57C00; stroke-width: 2; fill: none; marker-end: url(#arrowhead-orange); }
      .component { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F57C00" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="30" class="title">Frontend Pages Map and Navigation</text>

  <!-- === PUBLIC PAGES (Top Row) === -->
  <text x="700" y="80" class="subtitle">PUBLIC PAGES (No Authentication Required)</text>

  <!-- Login Page -->
  <rect x="80" y="120" width="160" height="120" class="page-public" rx="5"/>
  <text x="160" y="145" class="text">LOGIN PAGE</text>
  <text x="160" y="165" class="component">/login</text>
  <line x1="100" y1="180" x2="220" y2="180" stroke="#F57C00" stroke-width="1"/>
  <text x="160" y="200" class="component">Email input</text>
  <text x="160" y="215" class="component">Password input</text>
  <text x="160" y="230" class="component">Sign in button</text>

  <!-- Signup Page -->
  <rect x="350" y="120" width="160" height="120" class="page-public" rx="5"/>
  <text x="430" y="145" class="text">SIGNUP PAGE</text>
  <text x="430" y="165" class="component">/signup</text>
  <line x1="370" y1="180" x2="490" y2="180" stroke="#F57C00" stroke-width="1"/>
  <text x="430" y="200" class="component">Email input</text>
  <text x="430" y="215" class="component">Password input</text>
  <text x="430" y="230" class="component">Display name</text>

  <!-- Forgot Password Page -->
  <rect x="620" y="120" width="160" height="120" class="page-public" rx="5"/>
  <text x="700" y="145" class="text">FORGOT PASSWORD</text>
  <text x="700" y="165" class="component">/forgot-password</text>
  <line x1="640" y1="180" x2="760" y2="180" stroke="#F57C00" stroke-width="1"/>
  <text x="700" y="200" class="component">Email input</text>
  <text x="700" y="215" class="component">Reset link sender</text>
  <text x="700" y="230" class="component">Error handling</text>

  <!-- Logout Page -->
  <rect x="890" y="120" width="160" height="120" class="page-public" rx="5"/>
  <text x="970" y="145" class="text">LOGOUT PAGE</text>
  <text x="970" y="165" class="component">/logout</text>
  <line x1="910" y1="180" x2="1030" y2="180" stroke="#F57C00" stroke-width="1"/>
  <text x="970" y="200" class="component">Clear token</text>
  <text x="970" y="215" class="component">Redirect to login</text>
  <text x="970" y="230" class="component">Cleanup</text>

  <!-- === PROTECTED PAGES (Middle Row) === -->
  <text x="700" y="320" class="subtitle">PROTECTED PAGES (Requires Authentication)</text>

  <!-- Phones List Page -->
  <rect x="150" y="360" width="180" height="140" class="page-protected" rx="5"/>
  <text x="240" y="385" class="text">PHONES PAGE</text>
  <text x="240" y="405" class="component">/phones</text>
  <line x1="160" y1="420" x2="320" y2="420" stroke="#1976D2" stroke-width="1"/>
  <text x="240" y="440" class="component">Phone list (paginated)</text>
  <text x="240" y="455" class="component">Search and filters</text>
  <text x="240" y="470" class="component">Create button</text>
  <text x="240" y="485" class="component">Click to detail</text>

  <!-- Phone Detail Page -->
  <rect x="550" y="360" width="180" height="140" class="page-protected" rx="5"/>
  <text x="640" y="385" class="text">PHONE DETAIL</text>
  <text x="640" y="405" class="component">/phones/:id</text>
  <line x1="560" y1="420" x2="720" y2="420" stroke="#1976D2" stroke-width="1"/>
  <text x="640" y="440" class="component">Phone details</text>
  <text x="640" y="455" class="component">Edit form</text>
  <text x="640" y="470" class="component">Owner relations</text>
  <text x="640" y="485" class="component">Delete option</text>

  <!-- === COMPONENTS LEGEND === -->
  <text x="700" y="580" class="subtitle">Page Components and Services</text>

  <!-- Common Components -->
  <rect x="80" y="620" width="200" height="140" fill="none" stroke="#999" stroke-width="1" rx="3"/>
  <text x="180" y="640" class="subtitle">Common Components</text>
  <text x="100" y="665" class="component">• ProtectedRoute</text>
  <text x="100" y="680" class="component">  (Route wrapper)</text>
  <text x="100" y="695" class="component">• Navigation menu</text>
  <text x="100" y="710" class="component">• Header/Footer</text>
  <text x="100" y="725" class="component">• Error messages</text>

  <!-- API Services -->
  <rect x="350" y="620" width="200" height="140" fill="none" stroke="#999" stroke-width="1" rx="3"/>
  <text x="450" y="640" class="subtitle">API Services (api.js)</text>
  <text x="370" y="665" class="component">• signup()</text>
  <text x="370" y="680" class="component">• signin()</text>
  <text x="370" y="695" class="component">• listPhones()</text>
  <text x="370" y="710" class="component">• getPhone()</text>
  <text x="370" y="725" class="component">• updatePhone()</text>

  <!-- State Management -->
  <rect x="620" y="620" width="200" height="140" fill="none" stroke="#999" stroke-width="1" rx="3"/>
  <text x="720" y="640" class="subtitle">State Management</text>
  <text x="640" y="665" class="component">• localStorage token</text>
  <text x="640" y="680" class="component">  storage</text>
  <text x="640" y="695" class="component">• User state</text>
  <text x="640" y="710" class="component">• Phone data cache</text>
  <text x="640" y="725" class="component">• Auth context</text>

  <!-- Authentication Flow -->
  <rect x="890" y="620" width="200" height="140" fill="none" stroke="#999" stroke-width="1" rx="3"/>
  <text x="990" y="640" class="subtitle">Auth Flow</text>
  <text x="910" y="665" class="component">• JWT token</text>
  <text x="910" y="680" class="component">• Bearer header</text>
  <text x="910" y="695" class="component">• 401 redirect</text>
  <text x="910" y="710" class="component">• Session check</text>
  <text x="910" y="725" class="component">• Auto-logout</text>

  <!-- === NAVIGATION FLOWS === -->
  <!-- Login to Signup -->
  <path d="M 240 240 L 350 180" class="arrow"/>
  <text x="280" y="205" class="label">Sign up link</text>

  <!-- Signup to Login -->
  <path d="M 410 240 L 240 180" class="arrow"/>
  <text x="320" y="205" class="label">Back to login</text>

  <!-- Forgot Password link -->
  <path d="M 600 180 L 620 180" class="arrow"/>
  <text x="610" y="170" class="label">Forgot pwd</text>

  <!-- Login successful redirect -->
  <path d="M 160 240 L 240 360" class="arrow-auth"/>
  <text x="160" y="305" class="label">Auth token</text>

  <!-- Phones to Phone Detail -->
  <path d="M 330 430 L 550 430" class="arrow"/>
  <text x="440" y="420" class="label">Click phone</text>

  <!-- Phone Detail back to Phones -->
  <path d="M 550 430 L 330 430" class="arrow"/>
  <text x="440" y="445" class="label">Back</text>

  <!-- Logout from any page -->
  <path d="M 970 240 L 240 360" class="arrow-auth" stroke-dasharray="5,5"/>
  <text x="620" y="285" class="label">Logout → Clear token</text>

  <!-- Legend -->
  <rect x="50" y="820" width="1300" height="60" fill="none" stroke="#ccc" stroke-width="1"/>
  <rect x="80" y="830" width="20" height="20" class="page-public"/>
  <text x="110" y="845" class="label" style="text-anchor: start;">Public Page (No auth required)</text>
  
  <rect x="350" y="830" width="20" height="20" class="page-protected"/>
  <text x="380" y="845" class="label" style="text-anchor: start;">Protected Page (Auth required)</text>
  
  <line x1="620" y1="840" x2="670" y2="840" class="arrow"/>
  <text x="690" y="845" class="label" style="text-anchor: start;">Navigation flow</text>
  
  <line x1="970" y1="840" x2="1020" y2="840" class="arrow-auth"/>
  <text x="1040" y="845" class="label" style="text-anchor: start;">Auth-related flow</text>
</svg>