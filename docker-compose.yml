services:
  postgres:
    image: postgres:14-alpine
    container_name: phone_list_db
    environment:
      POSTGRES_USER: phone_user
      POSTGRES_PASSWORD: phone_password
      POSTGRES_DB: phone_list
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phone_user -d phone_list"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: phone_list_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: phone_list_api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://phone_user:phone_password@postgres:5432/phone_list
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-secret-key-change-in-production-min-32-chars
      FRONTEND_URL: http://localhost:3000
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: phone_list_web
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
